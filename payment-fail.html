<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: white; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 360px; width: 90%; }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; color: #333; margin: 0 0 8px; }
        p { color: #666; margin: 0 0 24px; }
        .error-code { font-size: 13px; color: #999; background: #f5f5f5; border-radius: 8px; padding: 8px 12px; margin-bottom: 24px; word-break: break-all; }
        .btn { display: block; background: #0064ff; color: white; border: none; border-radius: 10px; padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">❌</div>
    <h1>결제 실패</h1>
    <p id="msg">결제가 취소되었거나 실패했습니다.</p>
    <div class="error-code" id="code" style="display:none"></div>
    <a class="btn" href="javascript:history.back()">다시 시도하기</a>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const msg = params.get('message');
    const code = params.get('code');
    if (msg) document.getElementById('msg').textContent = msg;
    if (code) {
        document.getElementById('code').textContent = '오류코드: ' + code;
        document.getElementById('code').style.display = 'block';
    }
</script>
</body>
</html>
