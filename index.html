<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당 주문 - 테이블 QR 오더</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🍜 메뉴판</h1>
            <div class="header-row">
                <div class="table-info">테이블 번호: <span id="tableNumber">1</span></div>
                <button class="history-btn" id="historyButton">
                    <i data-lucide="clipboard-list"></i> 주문내역
                </button>
            </div>
        </header>

        <!-- Content Area: sidebar + menu -->
        <div class="content-area">
            <!-- Category Navigation (동적 렌더링) -->
            <nav class="category-nav" id="categoryNav">
                <button class="category-btn active" data-category="all" onclick="filterByCategory('all')">
                    <span class="cat-emoji">🍽️</span>
                    <span class="cat-text">전체</span>
                </button>
                <button class="staff-call-btn" id="staffCallBtn">
                    <i data-lucide="bell"></i>
                    <span>호출</span>
                </button>
            </nav>

            <!-- Menu Container (동적 렌더링) -->
            <div class="menu-container" id="menuContainer">
                <div class="menu-loading">메뉴를 불러오는 중...</div>
            </div>
        </div>

        <!-- Cart Button -->
        <button class="cart-button" id="cartButton">
            <i data-lucide="shopping-cart"></i> 장바구니 <span id="cartCount">0</span>
        </button>

        <!-- Cart Modal -->
        <div class="modal" id="cartModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🛒 장바구니</h2>
                    <button class="close-btn" id="closeModal">&times;</button>
                </div>
                <div class="cart-items" id="cartItems">
                    <p class="empty-cart">장바구니가 비어있습니다</p>
                </div>
                <div class="cart-summary">
                    <div class="total-row">
                        <span>총 금액:</span>
                        <span class="total-price" id="totalPrice">0원</span>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="clearCart">전체 삭제</button>
                    <button class="btn btn-primary" id="orderButton">주문하기</button>
                </div>
            </div>
        </div>

        <!-- Order Confirmation Modal -->
        <div class="modal" id="confirmModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>✅ 주문 완료</h2>
                </div>
                <div class="confirm-message">
                    <p>주문이 접수되었습니다!</p>
                    <p>잠시만 기다려 주세요.</p>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="closeConfirm">확인</button>
                </div>
            </div>
        </div>

        <!-- Order History Modal -->
        <div class="modal" id="historyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📋 테이블 <span id="historyTableNumber"></span> 주문내역</h2>
                    <button class="close-btn" id="closeHistory">&times;</button>
                </div>
                <div class="history-items" id="historyItems">
                    <p class="empty-history">주문 내역이 없습니다</p>
                </div>
            </div>
        </div>

        <!-- Staff Call Modal -->
        <div class="modal" id="staffCallModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🔔 직원 호출</h2>
                    <button class="close-btn" id="closeStaffCall">&times;</button>
                </div>
                <div class="staff-call-options">
                    <button class="staff-call-option" data-message="물 좀 주세요">
                        💧 물 좀 주세요
                    </button>
                    <button class="staff-call-option" data-message="물수건 갖다주세요">
                        🧻 물수건 갖다주세요
                    </button>
                    <button class="staff-call-option" data-message="직접 와주세요">
                        👋 직접 와주세요
                    </button>
                </div>
                <div class="staff-call-custom">
                    <input type="text" id="customCallMessage" placeholder="직접 내용을 입력하세요...">
                    <button id="sendCustomCall"><i data-lucide="send"></i></button>
                </div>
            </div>
        </div>

        <!-- Staff Call Confirmation Modal -->
        <div class="modal" id="staffCallConfirmModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>✅ 호출 완료</h2>
                </div>
                <div class="confirm-message">
                    <p>직원을 호출했습니다!</p>
                    <p>잠시만 기다려 주세요.</p>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="closeStaffCallConfirm">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/api-client.js"></script>
    <script src="/script.js"></script>
    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
