<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 관리 - 업주용</title>
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- 업무개시 팝업 — 터치로 AudioContext 초기화 -->
    <div id="startWorkOverlay" style="
        position:fixed;inset:0;z-index:99999;
        background:rgba(15,15,30,0.92);
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;gap:24px;">
        <div style="font-size:2.2rem;">🍽️</div>
        <div style="color:#fff;font-size:1.3rem;font-weight:700;letter-spacing:0.04em;">주문 관리 시스템</div>
        <div style="color:#aaa;font-size:0.95rem;">알림음 활성화를 위해 아래 버튼을 눌러주세요</div>
        <button id="startWorkBtn" style="
            margin-top:8px;padding:18px 48px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:#fff;border:none;border-radius:16px;
            font-size:1.25rem;font-weight:800;
            cursor:pointer;box-shadow:0 8px 24px rgba(102,126,234,0.5);
            letter-spacing:0.06em;">
            ✅ 업무 개시
        </button>
    </div>

    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-top">
                <h1>🍽️ 주문 관리 시스템</h1>
                <div class="date-picker-bar">
                    <button class="date-nav-btn" id="prevDay"><i data-lucide="chevron-left"></i></button>
                    <div class="date-input-wrapper">
                        <label for="dateFilter"><i data-lucide="calendar" class="date-cal-icon"></i></label>
                        <input type="date" id="dateFilter" />
                    </div>
                    <button class="date-nav-btn" id="nextDay"><i data-lucide="chevron-right"></i></button>
                    <button class="date-today-btn" id="todayBtn">오늘</button>
                </div>
            </div>
            <div class="header-info">
                <span class="current-time" id="currentTime"></span>
                <button class="pending-toggle active" id="pendingToggle">
                    <i data-lucide="clock"></i> 대기 <span id="pendingCount">0</span>
                </button>
                <button class="staff-call-toggle" id="staffCallToggle">
                    <i data-lucide="bell"></i> 호출 <span id="callCountHeader">0</span>
                </button>
                <a href="/staff-order" class="menu-manage-btn">
                    <i data-lucide="clipboard-pen"></i> 직원주문
                </a>
                <a href="/menu-admin" class="menu-manage-btn">
                    <i data-lucide="utensils"></i> 메뉴관리
                </a>
                <a href="/stats" class="menu-manage-btn">
                    <i data-lucide="bar-chart-3"></i> 통계
                </a>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <section class="stats-dashboard">
            <div class="stat-card highlight full-width">
                <div class="stat-icon"><i data-lucide="banknote"></i></div>
                <div class="stat-info">
                    <div class="stat-label">오늘 총 매출</div>
                    <div class="stat-value" id="totalRevenue">0원</div>
                </div>
            </div>
        </section>

        <!-- Order Stats -->
        <section class="order-stats">
            <div class="stat-card compact stat-filter active" data-status="all">
                <div class="stat-icon"><i data-lucide="list"></i></div>
                <div class="stat-info">
                    <div class="stat-label">전체</div>
                    <div class="stat-value" id="totalOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="pending">
                <div class="stat-icon"><i data-lucide="timer"></i></div>
                <div class="stat-info">
                    <div class="stat-label">대기중</div>
                    <div class="stat-value" id="pendingOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="cooking">
                <div class="stat-icon"><i data-lucide="flame"></i></div>
                <div class="stat-info">
                    <div class="stat-label">조리중</div>
                    <div class="stat-value" id="cookingOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="completed">
                <div class="stat-icon"><i data-lucide="check-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-label">완료</div>
                    <div class="stat-value" id="completedOrders">0</div>
                </div>
            </div>
        </section>

        <!-- Orders List -->
        <section class="orders-section">
            <div class="orders-header">
                <h2>주문 목록</h2>
            </div>
            <div class="orders-list" id="ordersList">
                <div class="empty-state">
                    <p>📭 주문이 없습니다</p>
                </div>
            </div>
        </section>

        <!-- Staff Calls Section -->
        <section class="staff-calls-section">
            <div class="section-header">
                <h2>🔔 직원 호출</h2>
                <span class="call-count" id="callCount">0</span>
            </div>
            <div class="staff-calls-list" id="staffCallsList">
                <div class="empty-state">
                    <p>호출이 없습니다</p>
                </div>
            </div>
        </section>

        <!-- Order Detail Modal -->
        <div class="modal" id="orderDetailModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>주문 상세</h2>
                    <button class="close-btn" id="closeDetailModal">&times;</button>
                </div>
                <div class="order-detail-content" id="orderDetailContent">
                </div>
            </div>
        </div>

        <!-- Sound Toggle -->
        <button class="sound-toggle" id="soundToggle" title="알림음 켜기/끄기">
            🔔
        </button>
        <!-- Wake Lock indicator -->
        <div id="wakeLockIndicator" style="display:none;position:fixed;bottom:16px;left:16px;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;padding:4px 10px;border-radius:20px;z-index:9999;">☀️ 화면 켜짐 유지</div>
    </div>

    <!-- 새 주문 알림 팝업 -->
    <div id="newOrderPopup" style="display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
        <div style="background:#1e1e2e;border-radius:20px;padding:28px 24px;min-width:300px;max-width:380px;max-height:80vh;overflow-y:auto;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.5);">
            <div style="font-size:2.8rem;margin-bottom:12px;">🔔</div>
            <div style="color:#fff;font-size:1.25rem;font-weight:800;margin-bottom:8px;">새 주문!</div>
            <div id="newOrderPopupMsg" style="color:#a78bfa;font-size:1.05rem;font-weight:600;margin-bottom:24px;"></div>
            <button id="newOrderPopupConfirm" style="
                width:100%;padding:14px;
                background:linear-gradient(135deg,#667eea,#764ba2);
                color:#fff;border:none;border-radius:12px;
                font-size:1.1rem;font-weight:800;cursor:pointer;
                box-shadow:0 4px 16px rgba(102,126,234,0.4);">
                ✅ 확인
            </button>
        </div>
    </div>

    <!-- 직원 호출 알림 팝업 -->
    <div id="staffCallPopup" style="display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
        <div style="background:#1e1e2e;border-radius:20px;padding:28px 24px;min-width:300px;max-width:380px;max-height:80vh;overflow-y:auto;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.5);">
            <div style="font-size:2.8rem;margin-bottom:12px;">🛎️</div>
            <div style="color:#fff;font-size:1.25rem;font-weight:800;margin-bottom:8px;">직원 호출!</div>
            <div id="staffCallPopupMsg" style="color:#f0a868;font-size:1.05rem;font-weight:600;margin-bottom:24px;"></div>
            <button id="staffCallPopupConfirm" style="
                width:100%;padding:14px;
                background:linear-gradient(135deg,#f0934a,#e0683a);
                color:#fff;border:none;border-radius:12px;
                font-size:1.1rem;font-weight:800;cursor:pointer;
                box-shadow:0 4px 16px rgba(240,147,74,0.4);">
                ✅ 확인
            </button>
        </div>
    </div>

    <script src="/api-client.js?v=20260620"></script>
    <script src="/admin-script.js?v=20260620"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
