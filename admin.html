<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 관리 - 업주용</title>
    <link rel="stylesheet" href="admin-styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="header-top">
                <h1>🏪 주문 관리 시스템</h1>
                <div class="date-picker-bar">
                    <button class="date-nav-btn" id="prevDay"><i data-lucide="chevron-left"></i></button>
                    <input type="date" id="dateFilter" />
                    <button class="date-nav-btn" id="nextDay"><i data-lucide="chevron-right"></i></button>
                    <button class="date-today-btn" id="todayBtn">오늘</button>
                </div>
            </div>
            <div class="header-info">
                <span class="current-time" id="currentTime"></span>
                <button class="pending-toggle active" id="pendingToggle">
                    <i data-lucide="clock"></i> 대기 <span id="pendingCount">0</span>
                </button>
                <button class="staff-call-toggle" id="staffCallToggle">
                    <i data-lucide="bell"></i> 호출 <span id="callCountHeader">0</span>
                </button>
                <a href="/staff-order" class="menu-manage-btn">
                    <i data-lucide="clipboard-pen"></i> 직원주문
                </a>
                <a href="/menu-admin" class="menu-manage-btn">
                    <i data-lucide="utensils"></i> 메뉴관리
                </a>
                <a href="/stats" class="menu-manage-btn">
                    <i data-lucide="bar-chart-3"></i> 통계
                </a>
            </div>
        </header>

        <!-- Stats Dashboard -->
        <section class="stats-dashboard">
            <div class="stat-card highlight full-width">
                <div class="stat-icon"><i data-lucide="banknote"></i></div>
                <div class="stat-info">
                    <div class="stat-label">오늘 총 매출</div>
                    <div class="stat-value" id="totalRevenue">0원</div>
                </div>
            </div>
        </section>

        <!-- Order Stats -->
        <section class="order-stats">
            <div class="stat-card compact stat-filter active" data-status="all">
                <div class="stat-icon"><i data-lucide="list"></i></div>
                <div class="stat-info">
                    <div class="stat-label">전체</div>
                    <div class="stat-value" id="totalOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="pending">
                <div class="stat-icon"><i data-lucide="timer"></i></div>
                <div class="stat-info">
                    <div class="stat-label">대기중</div>
                    <div class="stat-value" id="pendingOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="cooking">
                <div class="stat-icon"><i data-lucide="flame"></i></div>
                <div class="stat-info">
                    <div class="stat-label">조리중</div>
                    <div class="stat-value" id="cookingOrders">0</div>
                </div>
            </div>
            <div class="stat-card compact stat-filter" data-status="completed">
                <div class="stat-icon"><i data-lucide="check-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-label">완료</div>
                    <div class="stat-value" id="completedOrders">0</div>
                </div>
            </div>
        </section>

        <!-- Orders List -->
        <section class="orders-section">
            <div class="orders-header">
                <h2>주문 목록</h2>
            </div>
            <div class="orders-list" id="ordersList">
                <div class="empty-state">
                    <p>📭 주문이 없습니다</p>
                </div>
            </div>
        </section>

        <!-- Staff Calls Section -->
        <section class="staff-calls-section">
            <div class="section-header">
                <h2>🔔 직원 호출</h2>
                <span class="call-count" id="callCount">0</span>
            </div>
            <div class="staff-calls-list" id="staffCallsList">
                <div class="empty-state">
                    <p>호출이 없습니다</p>
                </div>
            </div>
        </section>

        <!-- Order Detail Modal -->
        <div class="modal" id="orderDetailModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>주문 상세</h2>
                    <button class="close-btn" id="closeDetailModal">&times;</button>
                </div>
                <div class="order-detail-content" id="orderDetailContent">
                </div>
            </div>
        </div>

        <!-- Sound Toggle -->
        <button class="sound-toggle" id="soundToggle" title="알림음 켜기/끄기">
            🔔
        </button>
    </div>

    <script src="/api-client.js"></script>
    <script src="/admin-script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
